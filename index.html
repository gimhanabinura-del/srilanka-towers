<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ROUTER HOME - Signal Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100%; position: absolute; z-index: 1; }
        
        /* Business Header */
        .top-container { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 95%; max-width: 450px; text-align: center; }
        .biz-header { 
            background: #1a73e8; color: white; padding: 12px; border-radius: 10px 10px 0 0; 
            font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .biz-logo { height: 30px; width: auto; border-radius: 4px; }
        .select-box { width: 100%; padding: 12px; border-radius: 0 0 10px 10px; border: 2px solid #1a73e8; font-size: 16px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); font-weight: bold; }

        /* Floating Buttons */
        .social-buttons { position: fixed; bottom: 140px; right: 20px; z-index: 1500; display: flex; flex-direction: column; gap: 10px; }
        .social-btn { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .whatsapp { background-color: #25D366; }
        .facebook { background-color: #1877F2; }

        .loc-button { position: fixed; bottom: 85px; right: 20px; z-index: 1500; background: white; color: #1a73e8; border: 2px solid #1a73e8; width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Popup Content Styles */
        .popup-card { text-align: center; width: 180px; }
        .popup-logo { width: 60px; margin-bottom: 5px; border-radius: 5px; }
        .buy-now-btn { background: #25D366; color: white !important; padding: 8px 15px; text-decoration: none; display: block; border-radius: 5px; font-weight: bold; margin-top: 8px; font-size: 14px; }
        
        /* Secret Admin */
        .secret-admin { position: fixed; bottom: 30px; right: 20px; z-index: 1500; background: #333; color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 15px; cursor: pointer; opacity: 0.3; }
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 85%; max-width: 320px; }
        .admin-input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="top-container">
        <div class="biz-header">
            <img src="https://i.ibb.co/cXrHqXsF/logo.png" class="biz-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3659/3659899.png'">
            ROUTER HOME
        </div>
        <select id="networkSelect" class="select-box" onchange="updateDisplay()">
            <option value="">ජාලය තෝරන්න (Select Network)</option>
            <option value="Hutch">Hutch 4G/5G</option>
            <option value="Mobitel">Mobitel 4G/5G</option>
            <option value="Dialog">Dialog 4G/5G</option>
        </select>
    </div>

    <div class="social-buttons">
        <a href="https://wa.me/94765825288" target="_blank" class="social-btn whatsapp">💬</a>
        <a href="https://www.facebook.com/share/1CMKzHNNiM/" target="_blank" class="social-btn facebook">f</a>
    </div>

    <div id="adminPanel">
        <h3 style="margin:0; color:#1a73e8; text-align:center;">Tower එකතු කරන්න</h3>
        <select id="adminNetSelect" class="admin-input">
            <option value="Hutch">Hutch</option>
            <option value="Mobitel">Mobitel</option>
            <option value="Dialog">Dialog</option>
        </select>
        <input type="number" id="towerLat" class="admin-input" step="any" placeholder="Latitude">
        <input type="number" id="towerLng" class="admin-input" step="any" placeholder="Longitude">
        <button style="width:100%; padding:12px; background:#1a73e8; color:white; border:none; border-radius:5px; cursor:pointer;" onclick="saveTower()">සේව් කරන්න</button>
        <button onclick="closeAdmin()" style="width:100%; border:none; background:none; margin-top:10px; color:#666; cursor:pointer;">වහන්න</button>
    </div>

    <div id="map"></div>

    <button class="loc-button" onclick="findMyLocation()">📍</button>
    <button class="secret-admin" onclick="openAdmin()">⚙️</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ඔබේ ලෝගෝ එකේ Direct Link එක
        var myLogoUrl = "https://i.ibb.co/cXrHqXsF/logo.png"; 

        var publicTowers = { 
            "Mobitel": [
                { lat: 6.665369, lng: 79.929752 }, { lat: 6.665151, lng: 79.939237 }, 
                { lat: 6.675131, lng: 79.927113 }, { lat: 6.684259, lng: 79.919874 },
                { lat: 6.713812, lng: 79.907549 }, { lat: 6.710636, lng: 79.909850 },
                { lat: 6.653197, lng: 79.940395 }, { lat: 6.682647, lng: 79.941428 },
                { lat: 6.561321, lng: 79.969582 }, { lat: 6.523607, lng: 80.115234 }
            ], 
            "Dialog": [
                { lat: 6.665151, lng: 79.939237 }, { lat: 6.661641, lng: 79.928093 }, 
                { lat: 6.675131, lng: 79.927113 }, { lat: 6.713812, lng: 79.907549 },
                { lat: 6.653197, lng: 79.940395 }, { lat: 6.564283, lng: 79.984304 },
                { lat: 6.561321, lng: 79.969582 }, { lat: 6.585204, lng: 79.960552 },
                { lat: 6.726457, lng: 79.900981 }, { lat: 6.523607, lng: 80.115234 },
                { lat: 6.480516, lng: 80.122775 }
            ], 
            "Hutch": [
                { lat: 6.665151, lng: 79.939237 }, { lat: 6.675131, lng: 79.927113 },
                { lat: 6.684259, lng: 79.919874 }, { lat: 6.712213, lng: 79.906997 },
                { lat: 6.653197, lng: 79.940395 }, { lat: 6.564283, lng: 79.984304 },
                { lat: 6.561321, lng: 79.969582 }, { lat: 6.726457, lng: 79.900981 },
                { lat: 6.523607, lng: 80.115234 },
                { lat: 6.480516, lng: 80.122775 }
            ] 
        };

        var localData = JSON.parse(localStorage.getItem('myTowers')) || { "Hutch": [], "Mobitel": [], "Dialog": [] };
        var myMap = L.map('map', { zoomControl: false }).setView([6.6, 79.9], 11);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(myMap);
        var markerGroup = L.layerGroup().addTo(myMap);

        function updateDisplay() {
            var net = document.getElementById('networkSelect').value;
            markerGroup.clearLayers();
            if (!net) return;
            var allForNet = publicTowers[net].concat(localData[net]);
            var bounds = [];
            
            allForNet.forEach(function(tower) {
                var popupContent = `
                    <div class="popup-card">
                        <img src="${myLogoUrl}" class="popup-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3659/3659899.png'">
                        <br><strong style="color:#1a73e8;">${net} Tower</strong><br>
                        <div style="font-size:12px; margin:5px 0;">හොඳම සිග්නල් මෙතැනට තිබේ.</div>
                        <a href="https://wa.me/94765825288?text=I%20saw%20${net}%20tower%20on%20Router%20Home%20map" 
                           target="_blank" class="buy-now-btn">මිලදී ගන්න</a>
                    </div>
                `;
                L.marker([tower.lat, tower.lng]).bindPopup(popupContent).addTo(markerGroup);
                bounds.push([tower.lat, tower.lng]);
            });
            if(bounds.length > 0) myMap.fitBounds(bounds, { padding: [50, 50] });
        }

        function openAdmin() { if (prompt("Password:") === "20101027") document.getElementById('adminPanel').style.display = 'block'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; }
        function saveTower() {
            var net = document.getElementById('adminNetSelect').value;
            var lat = parseFloat(document.getElementById('towerLat').value);
            var lng = parseFloat(document.getElementById('towerLng').value);
            if (!isNaN(lat) && !isNaN(lng)) {
                localData[net].push({ lat: lat, lng: lng });
                localStorage.setItem('myTowers', JSON.stringify(localData));
                alert("Tower එකතු වුණා!");
                updateDisplay();
                closeAdmin();
            }
        }

        function findMyLocation() {
            myMap.locate({setView: true, maxZoom: 14});
            myMap.on('locationfound', function(e) {
                L.circleMarker(e.latlng, {radius: 8, color: '#1a73e8', fillColor: '#1a73e8', fillOpacity: 0.8}).addTo(myMap).bindPopup("ඔබ සිටින ස්ථානය").openPopup();
            });
        }
    </script>
</body>
</html>
